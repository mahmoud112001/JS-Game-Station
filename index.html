<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hangman — Dark Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <!-- ══ START SCREEN ══════════════════════════════ -->
  <div id="startScreen" class="screen active">
    <div class="start-wrapper">

      <div class="gallows-preview">
        <svg viewBox="0 0 120 160" width="100" height="130">
          <line x1="10" y1="150" x2="110" y2="150" stroke="#f7df1e" stroke-width="4" stroke-linecap="round"/>
          <line x1="30" y1="150" x2="30"  y2="10"  stroke="#f7df1e" stroke-width="4" stroke-linecap="round"/>
          <line x1="30" y1="10"  x2="80"  y2="10"  stroke="#f7df1e" stroke-width="4" stroke-linecap="round"/>
          <line x1="80" y1="10"  x2="80"  y2="30"  stroke="#f7df1e" stroke-width="3" stroke-linecap="round"/>
          <circle cx="80" cy="44" r="13" stroke="rgba(247,223,30,0.25)" stroke-width="3" fill="none" stroke-dasharray="4 3"/>
        </svg>
      </div>

      <div class="brand">
        <span class="brand-tag">// classic word game</span>
        <h1 class="game-title">HANGMAN</h1>
        <p class="brand-sub">Dark Edition</p>
      </div>

      <div class="start-form">
        <div class="field">
          <label for="playerName">Your Name</label>
          <input type="text" id="playerName" placeholder="Enter your name..." autocomplete="off" maxlength="20"/>
          <span class="err-msg" id="nameError"></span>
        </div>

        <div class="field">
          <label>Difficulty</label>
          <div class="difficulty-row">
            <button class="diff-btn active" data-diff="easy">Easy</button>
            <button class="diff-btn" data-diff="medium">Medium</button>
            <button class="diff-btn" data-diff="hard">Hard</button>
          </div>
          <span class="diff-desc" id="diffDesc">8 lives · hints allowed · score ×1</span>
        </div>

        <p class="choose-label">// choose a category</p>
        <div id="categoryList" class="category-grid"></div>
      </div>

      <div class="leaderboard" id="leaderboard">
        <p class="lb-title">// top scores</p>
        <div id="lbList"><span class="lb-empty">No scores yet.</span></div>
      </div>

    </div>
  </div>

  <!-- ══ GAME SCREEN ════════════════════════════════ -->
  <div id="gameScreen" class="screen">

    <div class="top-bar">
      <div class="top-item">
        <span class="top-label">player</span>
        <span class="top-val" id="playerDisplay">—</span>
      </div>
      <div class="top-item">
        <span class="top-label">category</span>
        <span class="top-val" id="categoryDisplay">—</span>
      </div>
      <div class="top-item">
        <span class="top-label">score</span>
        <span class="top-val accent" id="scoreDisplay">600</span>
      </div>
      <div class="top-item">
        <span class="top-label">time</span>
        <span class="top-val" id="timerDisplay">0s</span>
      </div>
      <button class="quit-btn" id="quitBtn">✕ Quit</button>
    </div>

    <div class="game-body">

      <!-- Left panel -->
      <div class="left-panel">
        <div class="hangman-card">
          <svg class="hangman-svg" viewBox="0 0 160 200" width="160" height="200">
            <line x1="10" y1="190" x2="130" y2="190" stroke="#2a2e3a" stroke-width="5" stroke-linecap="round"/>
            <line x1="30" y1="190" x2="30"  y2="10"  stroke="#2a2e3a" stroke-width="5" stroke-linecap="round"/>
            <line x1="30" y1="10"  x2="110" y2="10"  stroke="#2a2e3a" stroke-width="5" stroke-linecap="round"/>
            <line x1="110" y1="10" x2="110" y2="35"  stroke="#2a2e3a" stroke-width="3" stroke-linecap="round"/>
            <circle id="svg-head" cx="110" cy="55"  r="20" stroke="#f7df1e" stroke-width="4" fill="none"     class="hpart"/>
            <line   id="svg-body" x1="110" y1="75"  x2="110" y2="130"  stroke="#f7df1e" stroke-width="4" stroke-linecap="round" class="hpart"/>
            <line   id="svg-larm" x1="110" y1="95"  x2="80"  y2="118"  stroke="#f7df1e" stroke-width="4" stroke-linecap="round" class="hpart"/>
            <line   id="svg-rarm" x1="110" y1="95"  x2="140" y2="118"  stroke="#f7df1e" stroke-width="4" stroke-linecap="round" class="hpart"/>
            <line   id="svg-lleg" x1="110" y1="130" x2="85"  y2="162"  stroke="#f7df1e" stroke-width="4" stroke-linecap="round" class="hpart"/>
            <line   id="svg-rleg" x1="110" y1="130" x2="135" y2="162"  stroke="#f7df1e" stroke-width="4" stroke-linecap="round" class="hpart"/>
          </svg>
        </div>

        <div class="lives-row">
          <span class="lives-label">lives</span>
          <div class="hearts" id="heartsDisplay"></div>
        </div>

        <button class="hint-btn" id="hintBtn">
          💡 Hint <span id="hintCount">(2 left)</span>
          <small>−50 pts</small>
        </button>

        <div class="diff-badge" id="diffBadge">EASY</div>
      </div>

      <!-- Right panel -->
      <div class="right-panel">
        <div class="word-section">
          <p class="word-hint-text" id="wordHint"></p>
          <div id="guessSlots" class="guess-slots"></div>
          <div class="wrong-row">
            <span class="wrong-label">wrong:</span>
            <span id="wrongLetters" class="wrong-letters">—</span>
          </div>
        </div>

        <div id="keyboard" class="keyboard"></div>
        <p class="keyboard-tip">// you can also use your physical keyboard</p>
      </div>

    </div>
  </div>

  <!-- ══ RESULT SCREEN ═════════════════════════════ -->
  <div id="resultScreen" class="screen">
    <div class="result-outer">
      <div class="result-card">

        <div class="result-emoji" id="resultEmoji">🎉</div>
        <h1 class="result-title" id="resultTitle">WINNER!</h1>
        <p class="result-player" id="resultPlayer"></p>

        <div class="result-word-box">
          <span class="result-word-label">the word was</span>
          <span class="result-word" id="resultWord"></span>
        </div>

        <div class="stats-grid">
          <div class="stat-box">
            <span class="stat-label">Final Score</span>
            <span class="stat-val accent" id="finalScore"></span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Mistakes</span>
            <span class="stat-val" id="finalMistakes"></span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Time</span>
            <span class="stat-val" id="finalTime"></span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Hints Used</span>
            <span class="stat-val" id="finalHints"></span>
          </div>
        </div>

        <div class="result-actions">
          <button class="btn-primary" id="playAgainBtn">Play Again</button>
          <button class="btn-ghost"  id="backMenuBtn">Main Menu</button>
        </div>

      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
